#     if: github.event_name == 'pull_request_review' && github.event.review.state == 'approved'
#     runs-on: ubuntu-latest
#     environment: beta
#     concurrency:
#       group: beta-pr-${{ github.event.pull_request.number }}   # per-PR; review events' github.ref is the base branch
#       cancel-in-progress: true        # newest approved change wins beta
#     steps:
#       - uses: actions/checkout@v4
#         with:
#           ref: ${{ github.event.review.commit_id }}   # ship exactly the SHA that was approved, not a later push
#       # - build artifact here, with a PR-scoped cache key, e.g.:
#       #     key: build-pr-${{ github.event.pull_request.number }}-${{ hashFiles(...) }}
#       # - authenticate via WIF (google-github-actions/auth, OIDC) — no static keys
#       - name: deploy-beta
#         run: echo "Ship prebuilt artifact to beta target."
